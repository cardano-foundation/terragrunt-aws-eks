general:
  project: "example-com"
  env-short: "dev"
  regions:
    - eu-west-1

default-aws-auth-extra-roles: &default-aws-auth-extra-roles
  - github-actions-assumed-role
  - AWSReservedSSO_AWSAdministratorAccess_*

default-exposed-ports: &default-exposed-ports
  traefik-nodeport:
    number: 30443
    protocol: tcp
    cidr-filters:
      - 0.0.0.0/0

default-eks-public-access-cidrs: &default-eks-public-access-cidrs
  basti0n: 127.0.0.0/32

default-helm-charts: &default-helm-charts
  cf-eks-baseline:
    repository: https://cardano-foundation.github.io/cf-helm-charts/
    version: 0.1.0
    namespace: kube-system

default-eks-addons: &default-eks-addons
  coredns:
    addon-version: v1.11.4-eksbuild.2
    resolve-conflicts: "OVERWRITE"
  vpc-cni:
    addon-version: v1.20.4-eksbuild.2
    resolve-conflicts: "OVERWRITE"
    env:
      ENABLE_PREFIX_DELEGATION: "true"

# key here is a mere human-readable description/tag
default-iam-policies: &default-iam-policies
  enable-ebs-creation: "arn:aws:iam::aws:policy/service-role/AmazonEBSCSIDriverPolicy"
  enable-efs-creation: "arn:aws:iam::aws:policy/service-role/AmazonEFSCSIDriverPolicy"
  enable-ssm-access: "arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore"

alb-dns-aliases: &default-alb-dns-aliases
  - api
  - auth-api

eks:
  cluster-module-source: cloudposse/eks-cluster/aws
  cluster-module-version: 4.6.0
  node-group-module-source: cloudposse/eks-node-group/aws
  node-group-module-version: 3.3.0
  regions:
    eu-west-1:
      cluster-name-0:
        alb-dns-aliases: *default-alb-dns-aliases
        aws-auth-extra-roles: *default-aws-auth-extra-roles
        k8s-version: 1.30
        public-access-cidrs: # this is used for kube api
          <<: *default-eks-public-access-cidrs
        resourceQuotas:
          countVolumeSnapshots: 50
        network:
          vpc: example-com
          allowed-cidr-blocks: # this is used for an special sg which allow full access to all the ports
            <<: *default-eks-public-access-cidrs
          subnets:
            - name: default
              kind: private
            - name: default
              kind: public
        addons:
          <<: *default-eks-addons
        helm-charts:
          <<: *default-helm-charts
        hybrid-node-groups:
          virginia:
            node-kubernetes-io-role: public
            network:
              vpc: cf-idw
              region: us-east-1
              subnet:
                name: default
                kind: private
              availability-zones:
                - b
            instance-types:
              - t3a.large
            desired-size: 1
            min-size: 1
            max-size: 1 
            # set ami filter to amazon linux 2023
            ami-name-filter: "ami-amazon-linux-latest/al2023-ami-minimal-kernel-default-x86_64"
            block-device-mappings:
              xvda:
                volume-size: 20 # gbs
                volume-type: gp3
                encrypted: true
                delete-on-termination: true
            swap:
              enabled: true
              size: 4 # gbs
            autoscaler-enabled: false
            cluster-log-retention-period: 7
            exposed-ports:
              <<: *default-exposed-ports
            extra-iam-policies:
              <<: *default-iam-policies
        # FIXME: missing ec2 names while using managed node groups
        # https://github.com/terraform-aws-modules/terraform-aws-eks/issues/2032  
        # potential fix: use our own launch templates
        node-groups:
          public:
            network:
              subnet:
                name: default
                kind: public
              availability-zones:
                - b
            node-taints:
              role:
                value: public
                effect: PREFER_NO_SCHEDULE
            desired-size: 1
            min-size: 1
            max-size: 3
            # NOTE: 110 is kubernetes' default, in aws, we require ENABLE_PREFIX_DELEGATION=true for vpc-cni addon
            # max-pods: 110
            swap:
              enabled: true
              size: 4 # gbs
            block-device-mappings:
              xvda:
                volume-size: 40 # gbs
                volume-type: gp3
                encrypted: false
                delete-on-termination: true
            autoscaler-enabled: true
            cluster-log-retention-period: 7
            instance-types: # if multiple are specified, the eks-node-group will randomly pick one
              - t3a.xlarge
            exposed-ports:
              <<: *default-exposed-ports
            extra-iam-policies:
              <<: *default-iam-policies
          private:
            network:
              subnet:
                name: default
                kind: private
              availability-zones:
                - b
            desired-size: 1
            min-size: 1
            max-size: 3
            instance-types:
              - t3a.medium
              - t3a.xlarge
      cluster-name-1:
        alb-dns-aliases: *default-alb-dns-aliases
        aws-auth-extra-roles: *default-aws-auth-extra-roles
        k8s-version: 1.33
        network:
          vpc: example-com
          subnet:
            name: default
            kind: private
        addons:
          <<: *default-eks-addons
        helm-charts:
          <<: *default-helm-charts
        # FIXME: missing ec2 names while using managed node groups
        # https://github.com/terraform-aws-modules/terraform-aws-eks/issues/2032  
        # potential fix: use our own launch templates
        node-groups:
          workers:
            desired-size: 1
            min-size: 1
            max-size: 10
            ami-type: AL2023_x86_64_STANDARD
            instance-types:
              - t3a.medium
            autoscaler-enabled: false
        
network:
  default_region: "eu-west-1"
  # NOTE: vpc names will be prefixed with env_short
  default_vpc: "example-com"
  route53:
    zones:
      default:
        tld: "example.com"
  vpc:
    vpc-module-source: "cloudposse/vpc/aws"
    vpc-module-version: "2.1.1"
    subnet-module-source: "cloudposse/dynamic-subnets/aws"
    subnet-module-version: "2.4.2"
    regions:
      eu-west-1:
        example-com:
          # NOTE:
          # - We will be using 10.128.0.0/9 for VPCs
          # - Assuming 1 public + 1 privates ubnet per vpc, we use /16 (aws max) for the whole VPC and /17 for each subnet
          ipv4-cidr: 10.128.0.0/16 # 10.128.0.0-10.128.255.254
          subnets:
            default:
              ipv4-cidr: 10.128.0.0/17 # 10.128.0.0-10.128.127.254
              private_subnets_enabled: true
              public_subnets_enabled: true
              igw: true
              ngw: true
              availability-zones:
              - eu-west-1a
              - eu-west-1b
              - eu-west-1c

      eu-west-2:
        cf-idw:
         ipv4-cidr: 10.129.0.0/16
         subnets:
           default:
             ipv4-cidr: 10.129.0.0/17
             private_subnets_enabled: true
             public_subnets_enabled: true
             igw: true
             ngw: true
             availability-zones:
             - eu-west-2a
             - eu-west-2b
             - eu-west-2c
         peering:
           to-control-plane:
              peer-vpc: cf-idw
              peer-region: eu-west-1

      us-east-1:
        cf-idw:
         ipv4-cidr: 10.130.0.0/16
         subnets:
           default:
             ipv4-cidr: 10.130.0.0/17
             private_subnets_enabled: true
             public_subnets_enabled: true
             igw: true
             ngw: true
             availability-zones:
             - us-east-1a
             - us-east-1b
             - us-east-1c
         peering:
           to-control-plane:
              peer-vpc: cf-idw
              peer-region: eu-west-1
           to-eu-west-2: # routes go both ways, so it's only each new region that needs to add a peering for every previous region 
              peer-vpc: cf-idw
              peer-region: eu-west-2
